name: Bootstrap Real 512890 History

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/bootstrap-history.yml"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Historical lookback window in natural days"
        required: false
        type: string
        default: "820"

concurrency:
  group: 512890-data-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync latest remote main
        run: |
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Bootstrap real market history
        run: |
          LOOKBACK_DAYS="${{ inputs.lookback_days }}"
          if [ -z "$LOOKBACK_DAYS" ]; then
            LOOKBACK_DAYS="820"
          fi
          python scripts/update_daily_snapshot.py --bootstrap-history --lookback-days "$LOOKBACK_DAYS"

      - name: Run tests
        run: pytest -q

      - name: Commit bootstrapped history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live_prices.csv data/latest_signal.json data/auto_portfolio.json data/signal_history.csv data/update_log.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: bootstrap real 512890 market history"
            git pull --rebase origin main
            git push origin main
          fi
