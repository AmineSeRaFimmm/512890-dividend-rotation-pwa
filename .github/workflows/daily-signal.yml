name: Update Daily 512890 Signal

on:
  schedule:
    # 18:15 Asia/Shanghai, after A-share market data should be settled.
    - cron: "15 10 * * 1-5"
  workflow_dispatch:

concurrency:
  group: 512890-data-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync latest remote main
        run: |
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update daily signal snapshot from recent real market data
        run: python scripts/update_daily_snapshot.py --lookback-days 15

      - name: Run tests
        run: pytest -q

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live_prices.csv data/latest_signal.json data/auto_portfolio.json data/signal_history.csv data/update_log.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: update daily 512890 signal snapshot"
            git pull --rebase origin main
            git push origin main
          fi
